<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal de Negociação — Cobra Tech</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --verde:#10b981; --verde-esc:#059669; --navy:#0b1220; --ink:#0f172a; --sub:#64748b; --linha:#e8edf4; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Inter',-apple-system,sans-serif; background:#eef1f6; color:var(--ink); font-size:15px; min-height:100vh; }

  .banner { background:#fbbf24; color:#78350f; text-align:center; padding:8px 14px; font-size:12px; font-weight:700; letter-spacing:.2px; }

  .hero { background:linear-gradient(150deg,var(--navy) 0%,#16233f 70%,#1b3a34 100%); padding:26px 20px 78px; color:#fff; }
  .marca { display:flex; align-items:center; gap:9px; font-weight:800; font-size:15px; justify-content:center; }
  .marca .mark { width:28px; height:28px; border-radius:8px; background:#060b16; display:grid; place-items:center; box-shadow:inset 0 0 0 1px rgba(52,211,153,.3); }
  .marca .mark svg { width:18px; height:18px; }
  .marca b { color:#34d399; }
  .hero p { text-align:center; margin-top:14px; font-size:14px; color:#cbd5e1; }
  .hero p strong { color:#fff; }

  main { max-width:440px; margin:-56px auto 40px; padding:0 16px; }
  .card { background:#fff; border-radius:20px; padding:24px; box-shadow:0 8px 30px -8px rgba(15,23,42,.18); margin-bottom:14px; }

  .rotulo { font-size:12px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.6px; }
  .valor { font-size:38px; font-weight:800; letter-spacing:-1.2px; margin:6px 0 2px; }
  .meta { font-size:13px; color:var(--sub); }
  .meta .atraso { color:#dc2626; font-weight:700; }
  .ref { background:#f8fafc; border:1px solid var(--linha); border-radius:10px; padding:9px 13px; font-size:13px; color:var(--sub); margin-top:12px; }

  .btn { width:100%; padding:15px; border:0; border-radius:13px; background:linear-gradient(135deg,var(--verde),var(--verde-esc)); color:#fff; font-weight:800; font-size:15px; font-family:inherit; cursor:pointer; margin-top:14px; box-shadow:0 6px 16px rgba(16,185,129,.35); transition:.15s; }
  .btn:active { transform:scale(.98); }
  .btn.sec { background:#fff; color:var(--ink); border:1.5px solid var(--linha); box-shadow:none; font-weight:700; }
  .ou { display:flex; align-items:center; gap:12px; color:#94a3b8; font-size:12px; font-weight:600; margin:18px 0 4px; }
  .ou::before,.ou::after { content:''; flex:1; height:1px; background:var(--linha); }
  select { width:100%; padding:13px; border:1.5px solid var(--linha); border-radius:13px; font-size:14.5px; font-family:inherit; margin-top:12px; background:#fbfcfe; font-weight:600; color:var(--ink); }

  /* QR / Pix */
  .qr-box { display:flex; flex-direction:column; align-items:center; margin-top:16px; }
  .qr { background:#fff; border:1.5px solid var(--linha); border-radius:16px; padding:12px; }
  .pix-code { background:#f8fafc; border:1.5px dashed #cbd5e1; border-radius:12px; padding:12px 14px; font-family:ui-monospace,monospace; font-size:11px; color:var(--sub); word-break:break-all; margin-top:14px; }
  .copiar { background:none; border:0; color:var(--verde-esc); font-weight:700; font-size:13px; cursor:pointer; margin-top:8px; font-family:inherit; }

  /* Parcelas */
  .prog-wrap { margin:14px 0 4px; }
  .prog { height:9px; background:#e8edf4; border-radius:99px; overflow:hidden; }
  .prog>div { height:100%; background:linear-gradient(90deg,var(--verde),#34d399); border-radius:99px; transition:width .5s; }
  .prog-leg { font-size:12.5px; color:var(--sub); margin-top:7px; font-weight:600; }
  .parc { display:flex; justify-content:space-between; align-items:center; padding:13px 2px; border-bottom:1px solid #f1f5f9; }
  .parc:last-of-type { border-bottom:0; }
  .parc .n { font-weight:700; font-size:14.5px; }
  .parc .v { font-size:12.5px; color:var(--sub); }
  .parc .pg { color:var(--verde-esc); font-weight:800; font-size:13.5px; }
  .parc button { border:0; border-radius:9px; background:var(--navy); color:#fff; font-weight:700; font-size:12.5px; padding:9px 14px; cursor:pointer; font-family:inherit; }

  /* Sucesso */
  .okwrap { text-align:center; padding:14px 0 6px; }
  .check { width:74px; height:74px; border-radius:99px; background:linear-gradient(135deg,var(--verde),#34d399); color:#fff; font-size:36px; display:grid; place-items:center; margin:0 auto 16px; box-shadow:0 10px 26px rgba(16,185,129,.4); animation:pop .5s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .okwrap h1 { font-size:21px; font-weight:800; letter-spacing:-.4px; }
  .okwrap p { color:var(--sub); font-size:14px; margin-top:8px; line-height:1.55; }

  h1.titulo { font-size:21px; font-weight:800; letter-spacing:-.4px; }
  .sub { color:var(--sub); font-size:13.5px; margin-top:4px; }
  .rodape { text-align:center; font-size:11.5px; color:#94a3b8; padding:0 24px 30px; line-height:1.6; }
</style>
</head>
<body>
<div class="banner" id="banner">⚠️ SIMULAÇÃO — este Pix é de mentira, nenhum valor será cobrado</div>
<div class="hero">
  <div class="marca"><div class="mark"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/></linearGradient></defs><path d="M 44.9 16.7 A 20 20 0 1 0 44.9 47.3" fill="none" stroke="url(#lg)" stroke-width="11" stroke-linecap="round"/><circle cx="44.9" cy="16.7" r="8.6" fill="url(#lg)"/><circle cx="47.6" cy="14.9" r="2" fill="#060b16"/></svg></div>Cobra<b>Tech</b></div>
  <p id="heroTxt">Portal seguro de negociação</p>
</div>
<main id="app"><div class="card">Carregando…</div></main>
<div class="rodape">Ambiente de demonstração da Cobra Tech.<br>Dúvidas? Responda a mensagem que você recebeu.</div>
<script>
const t = new URLSearchParams(location.search).get('t');
const fmt = v => 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
const app = document.getElementById('app');
let cob = null;

async function carregar(){
  const r = await fetch('/api/portal/'+t);
  if(!r.ok){ app.innerHTML = '<div class="card">Link inválido ou expirado. Confira a mensagem que você recebeu.</div>'; return; }
  cob = await r.json();
  if (cob.pix) {
    const b = document.getElementById('banner');
    b.style.background = '#0b1220'; b.style.color = '#34d399';
    b.textContent = '🔒 Pagamento via Pix direto para ' + cob.pix.nome;
  }
  render();
}

function pixFake(txid, valor){
  return `00020126SIMULACAO.cobratech.fake/${txid}5204000053039865406${Number(valor).toFixed(2)}5802BR6009SAO PAULO`;
}

// QR decorativo (simulação) desenhado em SVG
function qrSvg(seed){
  let h = 0; for (const ch of seed) h = (h*31 + ch.charCodeAt(0)) >>> 0;
  const rnd = () => (h = (h*1664525 + 1013904223) >>> 0) / 4294967296;
  const N=21, cel=7; let cells='';
  const olho = (x,y)=>`<rect x="${x*cel}" y="${y*cel}" width="${7*cel}" height="${7*cel}" rx="6" fill="#0b1220"/><rect x="${(x+1)*cel}" y="${(y+1)*cel}" width="${5*cel}" height="${5*cel}" rx="4" fill="#fff"/><rect x="${(x+2)*cel}" y="${(y+2)*cel}" width="${3*cel}" height="${3*cel}" rx="2" fill="#0b1220"/>`;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const emOlho=(x<8&&y<8)||(x>=N-8&&y<8)||(x<8&&y>=N-8);
    if(!emOlho && rnd()>.52) cells+=`<rect x="${x*cel}" y="${y*cel}" width="${cel}" height="${cel}" rx="1.5" fill="#0b1220"/>`;
  }
  return `<svg width="146" height="146" viewBox="0 0 ${N*cel} ${N*cel}" xmlns="http://www.w3.org/2000/svg">${cells}${olho(0,0)}${olho(N-7,0)}${olho(0,N-7)}</svg>`;
}

function render(){
  const nome = cob.devedor.nome.split(' ')[0];
  if(cob.status === 'paga'){
    heroTxt.innerHTML = 'Pendência regularizada';
    app.innerHTML = `<div class="card"><div class="okwrap">
      <div class="check">✓</div>
      <h1>Tudo certo, ${nome}!</h1>
      <p>Sua pendência de <strong>${fmt(cob.valor)}</strong> foi totalmente regularizada.<br>Você não deve mais nada. Obrigado! 💚</p>
    </div></div>`;
    return;
  }
  if(cob.status === 'acordo'){
    const parcs = cob.pagamentos.filter(p=>p.tipo==='parcela');
    const pagas = parcs.filter(p=>p.status==='pago').length;
    heroTxt.innerHTML = `Acordo ativo — <strong>${pagas} de ${parcs.length}</strong> parcelas pagas`;
    app.innerHTML = `<div class="card">
      <h1 class="titulo">Seu acordo, ${nome}</h1>
      <div class="sub">${cob.acordo.parcelas}x de ${fmt(cob.acordo.valorParcela)} — siga pagando para quitar</div>
      <div class="prog-wrap"><div class="prog"><div style="width:${(pagas/parcs.length)*100}%"></div></div>
      <div class="prog-leg">${pagas}/${parcs.length} pagas</div></div>
      ${parcs.map(p=>`<div class="parc">
        <div><div class="n">Parcela ${p.parcela}</div><div class="v">${fmt(p.valor)}</div></div>
        ${p.status==='pago' ? '<span class="pg">✓ Paga</span>' : p.status==='informado' ? '<span style="color:#b45309;font-weight:700;font-size:12.5px">⏳ Em confirmação</span>' : `<button onclick="pagarParcela('${p.txid}')">Pagar via Pix</button>`}
      </div>`).join('')}
      <div id="pixArea"></div>
    </div>`;
    return;
  }
  // aberta
  heroTxt.innerHTML = `Olá, <strong>${nome}</strong> — resolva sua pendência em 1 minuto`;
  app.innerHTML = `<div class="card">
    <div class="rotulo">Valor pendente</div>
    <div class="valor">${fmt(cob.valor)}</div>
    <div class="meta">Venceu em ${cob.vencimento.split('-').reverse().join('/')}${cob.diasAtraso>0 ? ` · <span class="atraso">${cob.diasAtraso} dias em atraso</span>` : ''}</div>
    ${cob.descricao ? `<div class="ref">📄 Referente a: ${cob.descricao}</div>` : ''}
    ${cob.diasAtraso>0
      ? `<button class="btn" onclick="pagarTotal(true)">Quitar à vista com ${cob.descontoAvista}% de desconto — ${fmt(cob.valor*(1-cob.descontoAvista/100))}</button>
         <button class="btn sec" onclick="pagarTotal(false)" style="margin-top:10px">Pagar valor cheio (${fmt(cob.valor)})</button>`
      : `<button class="btn" onclick="pagarTotal(false)">Pagar tudo agora via Pix</button>`}
    <div class="ou">ou parcele sem burocracia</div>
    <select id="selParc">
      ${[2,3,4,5,6].map(n=>`<option value="${n}">${n}x de ${fmt(cob.valor/n)}</option>`).join('')}
    </select>
    <button class="btn sec" onclick="fecharAcordo()">Fechar acordo parcelado</button>
    <div id="pixArea"></div>
  </div>`;
  if (cob.pagamentos.some(p=>p.status==='informado')) aguardando();
}

function mostrarPix(txid, valor, brcode){
  const real = !!brcode;
  const codigo = real ? brcode : pixFake(txid, valor);
  document.getElementById('pixArea').innerHTML = `
    <div class="ou">pague com o app do seu banco</div>
    <div class="qr-box">
      <div class="qr" id="qrReal">${real ? '' : qrSvg(txid)}</div>
      <div class="pix-code" id="pixCode">${codigo}</div>
      <button class="copiar" onclick="navigator.clipboard.writeText(document.getElementById('pixCode').textContent);this.textContent='✓ Copiado!'">⧉ Copiar código Pix</button>
    </div>
    <button class="btn" onclick="confirmar('${txid}')">${real ? 'Já fiz o pagamento' : 'Já paguei — simular confirmação'}</button>`;
  if (real && window.QRCode) new QRCode(document.getElementById('qrReal'), { text: codigo, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
  document.getElementById('pixArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function aguardando(){
  document.getElementById('pixArea').innerHTML = `
    <div class="ou">quase lá</div>
    <div style="background:#fffbeb;border:1.5px solid #fbbf24;border-radius:13px;padding:16px;text-align:center;font-size:14px;color:#92400e;font-weight:600">
      ⏳ Pagamento informado! Assim que o valor for identificado na conta, sua pendência será baixada automaticamente.
    </div>`;
}

async function pagarTotal(comDesconto){
  const p = await (await fetch('/api/portal/'+t+'/pagar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({desconto:!!comDesconto})})).json();
  mostrarPix(p.txid, p.valor, p.brcode);
}

function pagarParcela(txid){ const p = cob.pagamentos.find(x=>x.txid===txid); mostrarPix(p.txid, p.valor, p.brcode); }

async function fecharAcordo(){
  const n = document.getElementById('selParc').value;
  await fetch('/api/portal/'+t+'/acordo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({parcelas:n})});
  await carregar();
}

async function confirmar(txid){
  if (cob.pix) { // modo real: devedor informa, credor confirma
    await fetch('/api/portal/'+t+'/informei',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({txid})});
    aguardando();
    return;
  }
  await fetch('/api/webhook/pix',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({txid})});
  await carregar();
}

carregar();
</script>
</body>
</html>
